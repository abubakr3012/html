<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="./calc.css">
</head>
<body>
    <table>
        <tr>
            <td class="white" colspan="3"> 
                <input type="text">    
            </td>
            <td class="green">C</td>
        </tr>
        <tr>
            <td class="green">1</td>
            <td class="green">2</td>
            <td class="green">3</td>
            <td class="green">/</td>
        </tr>
        <tr>
            <td class="green">4</td>
            <td class="green">5</td>
            <td class="green">6</td>
            <td class="green">*</td>
        </tr>
        <tr>
            <td class="green">7</td>
            <td class="green">8</td>
            <td class="green">9</td>
            <td class="green">-</td>
        </tr>
        <tr>
            <td class="green">0</td>
            <td class="green">.</td>
            <td class="green">=</td>
            <td class="green">+</td>
        </tr>
    </table>
</body>
</html>
