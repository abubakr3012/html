<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tenth Homework</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="section">
        <h2>Registration</h2><hr>
        <div class="block1">
            <div class="left">
                <p>Full Name</p>
                <input type="text" placeholder="John Smith">
            </div>
            <div class="right">
                <p>Username</p>
                <input type="text" placeholder="John2211">
            </div>
        </div>
        <div class="block2">
            <div class="left">
                <p>Email</p>
                <input type="email" placeholder="johnsmith@gmail.com">
            </div>
            <div class="right">
                <p>Phone Number</p>
                <input type="tel" placeholder="+1-123-456-789-0">
            </div>
        </div>
        <div class="block3">
            <div class="left">
                <p>Full Name</p>
                <input type="password" placeholder="********">
            </div>
            <div class="right">
                <p>Username</p>
                <input type="password" placeholder="********">
            </div>
        </div>
        <h4>Gender</h4>
        <div class="radio">
            <div class="main1">
                <input type="radio" name="click">
                <p>Male</p>
            </div>
            <div class="main2">
                <input type="radio" name="click">
                <p>Female</p>
            </div>
            <div class="main3">
                <input type="radio" name="click">
                <p>Prefer</p>
            </div>
        </div>
        <a href="./register.html">Register</a>
    </div>
</body>
</html>
